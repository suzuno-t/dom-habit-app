<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドM習慣アプリ・絶対動く版</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #121212;
        color: white;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        margin: 10px;
      }
      .btn-auth {
        background: #007bff;
        color: white;
      }
      .btn-start {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>ドM習慣アプリ（絶対動く版）</h1>

    <button id="auth-btn" class="btn-auth">1. 通知を許可する</button>
    <br /><br />
    <button id="start-btn" class="btn-start">2. 10秒のミッション開始</button>

    <p id="status-text">ボタンを押してね。</p>

    <script>
      const authBtn = document.getElementById("auth-btn");
      const startBtn = document.getElementById("start-btn");
      const statusText = document.getElementById("status-text");

      // 1. 通知の許可をもらう
      authBtn.addEventListener("click", () => {
        Notification.requestPermission().then((permission) => {
          if (permission === "granted") {
            statusText.innerText = "通知の許可OK！";
            // 許可をもらった瞬間に、テストで1発軽い通知を飛ばす（これで道を開通させる！）
            new Notification("接続テスト", { body: "いつでも罵れるわよ" });
          }
        });
      });

      // 2. 10秒タイマー（一番シンプルな方法に戻したよ！）
      startBtn.addEventListener("click", () => {
        statusText.innerText =
          "10秒数えるよ！画面を消さずに、そのまま10秒待ってみて！";

        // 10秒後に実行
        setTimeout(() => {
          statusText.innerText = "10秒経ったぞ！";

          // 許可されていれば、ドカンと通知を出す！
          if (Notification.permission === "granted") {
            new Notification("【警告】サボり検知", {
              body: "おい、10秒経ったぞ！いつまでサボってんだコラ！",
              requireInteraction: true, // ユーザーが消すまで画面に残り続けるモード！
            });
          }
        }, 10000);
      });
    </script>
  </body>
</html>
