<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドM習慣アプリ・バックグラウンド音声版</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #121212;
        color: white;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        margin: 10px;
      }
      .btn-start {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>ドM習慣アプリ（画面を閉じても罵倒版）</h1>

    <button id="start-btn" class="btn-start">
      ⏱️ 10秒後に裏から罵倒を仕掛ける
    </button>

    <p id="status-text">ボタンを押して、すぐ画面を消してみて！</p>

    <script>
      const startBtn = document.getElementById("start-btn");
      const statusText = document.getElementById("status-text");

      // 裏ボス（Service Worker）の登録
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then(() => console.log("裏ボス準備完了！"))
          .catch((err) => console.error(err));
      }

      // 裏ボス（sw.js）から「時間になったぞ」と連絡が来たら、表側で喋る魔法の仕組み
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.addEventListener("message", (event) => {
          if (event.data.action === "voice-batou") {
            // スマホを震わせて喋らせる！
            if (navigator.vibrate) {
              navigator.vibrate([200, 100, 200, 100, 500]);
            }

            const speech = new SpeechSynthesisUtterance();
            speech.text = event.data.message;
            speech.lang = "ja-JP";
            speech.rate = 1.1;
            window.speechSynthesis.speak(speech);

            statusText.innerText = "裏から叩き起こされて罵られました。";
          }
        });
      }

      // ボタンを押したら、裏ボスに「10秒数えて！」と丸投げする
      startBtn.addEventListener("click", () => {
        statusText.innerText = "裏ボスに命令したよ！すぐ画面を消して待ってて！";

        if (navigator.serviceWorker.controller) {
          // 裏ボスに「10秒（10000ミリ秒）数えろ」とデータを送る
          navigator.serviceWorker.controller.postMessage({ delay: 10000 });
        }
      });
    </script>
  </body>
</html>
