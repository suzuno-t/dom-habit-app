<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドM習慣アプリ・音声＆振動版</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #121212;
        color: white;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        margin: 10px;
      }
      .btn-test {
        background: #007bff;
        color: white;
      }
      .btn-start {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>ドM習慣アプリ（音声＆振動版）</h1>

    <button id="test-btn" class="btn-test">🔊 音声と振動のテスト</button>
    <br /><br />
    <button id="start-btn" class="btn-start">⏱️ 10秒のミッション開始</button>

    <p id="status-text">カスペルスキーに負けないぞ！ボタンを押してね。</p>

    <script>
      const testBtn = document.getElementById("test-btn");
      const startBtn = document.getElementById("start-btn");
      const statusText = document.getElementById("status-text");

      // 罵倒セリフのリスト（スマホがこれを喋るよ！）
      const batouMessages = [
        "おい、10秒経ったぞ。いつまでサボってんだコラ！",
        "やる気あんの？あんたの習慣化なんてその程度なんだね。",
        "はいサボったー。一生そのままダラダラ過ごせば？",
      ];

      // 【魔法の関数】スマホを震わせて喋らせる
      function playBatou(message) {
        // 1. スマホを激しく震わせる（200ミリ秒振動 → 100ミリ秒休憩 → 200ミリ秒振動…のパターン）
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200, 100, 500]);
        }

        // 2. スマホに罵倒セリフを喋らせる
        const speech = new SpeechSynthesisUtterance();
        speech.text = message;
        speech.lang = "ja-JP"; // 日本語
        speech.rate = 1.1; // ちょっと早口で怒ってる感を出す（1.0が標準）
        speech.pitch = 1.0; // 声の高さ（0.5〜2.0で変えられるよ）

        window.speechSynthesis.speak(speech);
      }

      // 1. テストボタンを押したとき
      testBtn.addEventListener("click", () => {
        statusText.innerText = "テスト発射！";
        playBatou("いつでも罵れる準備はできているわよ。");
      });

      // 2. 10秒タイマースタート
      startBtn.addEventListener("click", () => {
        statusText.innerText = "10秒数えるよ！画面を開いたまま待っててね！";

        setTimeout(() => {
          // ランダムに罵倒を選ぶ
          const randomIndex = Math.floor(Math.random() * batouMessages.length);
          const message = batouMessages[randomIndex];

          statusText.innerText = message;

          // 罵倒発射！
          playBatou(message);
        }, 10000);
      });
    </script>
  </body>
</html>
