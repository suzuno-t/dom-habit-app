<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドM習慣アプリ・初心に返る通知版</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #121212;
        color: white;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        margin: 10px;
      }
      .btn-auth {
        background: #007bff;
        color: white;
      }
      .btn-start {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>ドM習慣アプリ（初心に返る通知版）</h1>

    <button id="auth-btn" class="btn-auth">1. 通知の最終テスト</button>
    <br /><br />
    <button id="start-btn" class="btn-start">
      2. 10秒後に罵倒通知を飛ばす
    </button>

    <p id="status-text">設定で許可してくれたから、今度こそいけるはず！</p>

    <script>
      const authBtn = document.getElementById("auth-btn");
      const startBtn = document.getElementById("start-btn");
      const statusText = document.getElementById("status-text");

      // 裏ボスを再登録
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then(() => console.log("裏ボス復活！"))
          .catch((err) => console.error(err));
      }

      // 1. 最終テストボタン
      authBtn.addEventListener("click", () => {
        if (Notification.permission === "granted") {
          new Notification("接続テスト成功！", {
            body: "スマホの許可リストに入ったわよ！",
          });
        } else {
          Notification.requestPermission().then((permission) => {
            if (permission === "granted") {
              alert("許可されたよ！");
            }
          });
        }
      });

      // 2. タイマー（裏ボスにお願いして通知を出す）
      startBtn.addEventListener("click", () => {
        statusText.innerText =
          "裏に時限爆弾を仕掛けたよ。画面を消して10秒待て！";

        if (navigator.serviceWorker.controller) {
          // 裏ボス（sw.js）に10秒後に通知を出してと頼む
          navigator.serviceWorker.controller.postMessage({ delay: 10000 });
        }
      });
    </script>
  </body>
</html>
