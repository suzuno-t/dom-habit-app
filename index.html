<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドM習慣アプリ・Android突破版</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #121212;
        color: white;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        margin: 10px;
      }
      .btn-auth {
        background: #007bff;
        color: white;
      }
      .btn-start {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>ドM習慣アプリ（Android突破版）</h1>

    <button id="auth-btn" class="btn-auth">1. まず通知を許可</button>
    <br /><br />
    <button id="start-btn" class="btn-start">2. 10秒のミッション開始</button>

    <p id="status-text">ボタンを押してミッションを始めてね。</p>

    <script>
      const authBtn = document.getElementById("auth-btn");
      const startBtn = document.getElementById("start-btn");
      const statusText = document.getElementById("status-text");

      const batouMessages = [
        "おい、10秒経ったぞ！いつまでサボってんだコラ！",
        "やる気あんの？あんたの習慣化なんてその程度なんだね。",
        "はいサボったー。一生そのままダラダラ過ごせば？",
      ];

      // 裏ボスプログラム（Service Worker）を登録する設定
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then(() => console.log("裏ボスプログラム登録完了！"))
          .catch((err) => console.error("エラー:", err));
      }

      // 1. 通知の許可
      authBtn.addEventListener("click", () => {
        Notification.requestPermission().then((permission) => {
          if (permission === "granted") {
            alert("いつでも罵れるようになったわ（許可完了）");
          }
        });
      });

      // 2. タイマースタート
      startBtn.addEventListener("click", () => {
        statusText.innerText =
          "10秒以内にタスクを終わらせろ！画面を消して待て！";

        setTimeout(() => {
          const randomIndex = Math.floor(Math.random() * batouMessages.length);
          const message = batouMessages[randomIndex];

          // Androidで画面が消えていても確実に通知を出す書き方にパワーアップ！
          if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then((registration) => {
              registration.showNotification("【警告】サボり検知", {
                body: message,
                tag: "sabori-alert",
                renotify: true,
              });
            });
          }

          statusText.innerText = "サボったな！通知を確認しろ！";
        }, 10000);
      });
    </script>
  </body>
</html>
